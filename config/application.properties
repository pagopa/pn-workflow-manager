logging.config=config/logback-local.xml
server.port=8095å

# Runtime mode
pn.env.runtime=DEVELOPMENT

spring.cloud.aws.credentials.profile-name=${PN_AWS_PROFILE_NAME:default}
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.endpoint=http://localhost:4566

aws.region-code=us-east-1
aws.profile-name=${PN_AWS_PROFILE_NAME:default}
aws.endpoint-url=http://localhost:4566

# Queue inbound event configuration
pn.workflow-manager.topics.pn-workflow-manager-action-queue=pn-workflow-manager-action-queue

#EVENTBUS
pn.workflow-manager.event-bus.name=pn-CoreEventBus
pn.workflow-manager.event-bus.source=pn-workflow-manager
pn.workflow-manager.event-bus.outcome-event-detail-type=WorkflowManagerOutcomeEvent