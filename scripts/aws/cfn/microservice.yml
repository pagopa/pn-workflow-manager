AWSTemplateFormatVersion: 2010-09-09
Description: 'Example microservice deploy'

Parameters:
  ProjectName:
    Type: String
    Description: 'Usually pn can be pnXYZ where XYZ are the feature number, useful to create
      experimental environments without crash official development environment'

  AlarmSNSTopicArn:
    Type: String
    Description: ARN of alarm topic
  
  ContainerImageUri:
    Type: String
    Description: 'Exact container image URI with full repository and image digest'

  MicroserviceNumber:
    Type: Number
    Description: 'Disambiguation useful for load balancer rules'

  TemplateBucketBaseUrl:
    Type: String
    Description: 'The S3 bucket from which to fetch the templates used by this stack.'

  ECSClusterName:
    Type: String
    Description: 'The name of the ECS cluster where the microservice is going to be deployed'

  SubnetsIds:
    Type: CommaDelimitedList
    Description: 'subnets ids comma separated list. Where to deploy the microservice'

  VpcId:
    Type: String
    Description: 'VpcId where the microservice is going to be deployed'
  
  EcsDefaultSecurityGroup:
    Type: String
    Description: 'Default security group required by infrastructure'

  ApplicationLoadBalancerListenerArn:
    Type: String
    Description: 'Load balancer listener where HTTP endpoints is going to be registered'

  # Instance parameters
  # 256 (.25 vCPU) - Available memory values: 0.5GB, 1GB, 2GB
  # 512 (.5 vCPU) - Available memory values: 1GB, 2GB, 3GB, 4GB
  # 1024 (1 vCPU) - Available memory values: 2GB, 3GB, 4GB, 5GB, 6GB, 7GB, 8GB
  # 2048 (2 vCPU) - Available memory values: Between 4GB and 16GB in 1GB increments
  # 4096 (4 vCPU) - Available memory values: Between 8GB and 30GB in 1GB increments
  CpuValue:
    Type: Number
    Default: 1024
    Description: Fargate virtual CPU quantity 1024 equals one vCPU (Validator task)
  
  # 0.5GB, 1GB, 2GB - Available cpu values: 256 (.25 vCPU)
  # 1GB, 2GB, 3GB, 4GB - Available cpu values: 512 (.5 vCPU)
  # 2GB, 3GB, 4GB, 5GB, 6GB, 7GB, 8GB - Available cpu values: 1024 (1 vCPU)
  # Between 4GB and 16GB in 1GB increments - Available cpu values: 2048 (2 vCPU)
  # Between 8GB and 30GB in 1GB increments - Available cpu values: 4096 (4 vCPU)
  MemoryAmount:
    Type: String
    Default: 2GB
    Description: memory amount reserved to the task pod (Validator task)
    AllowedValues: [ 2GB, 4GB, 6GB, 8GB ]
  
  # Autoscaling parameters
  AutoscalingCheckPeriod:
    Default: 60
    Type: Number
    Description: minimum autoscaling number of tasks
  
  AutoscalingThreshold:
    Default: 70
    Type: Number
  
  AlbSecurityGroup:
    Type: String
    Description: 'Application load balancer security group'
  
  ApplicativeEnvFileChecksum:
    Type: String
    Default: ''
    Description: 'Applicative environment variable file checksum'
  
  MinTasksNumber:
    Default: 2
    Type: Number
    Description: minimum autoscaling number of tasks (task)
  
  MaxTasksNumber:
    Default: 6
    Type: Number
    Description: maximum autoscaling number of tasks (task)
  
  AutoscalingDataPointN:
    Default: 1
    Type: Number
    Description: activate when N datapoint on M (task)
  
  ApplicationLoadBalancerDomain:
    Type: String
    Description: 'Base URL of the load balancer where the service is going to be reachable'

  AutoscalingDataPointM:
    Default: 1
    Type: Number
    Description: activate when N datapoint on M (task)

  ApplicationLoadBalancerMetricsDimensionName:
    Type: String
    Description: Application load balancer dimension name

    # --- SQS Queues ---
  ConsumedQueueMessagePerMinute:
    Type: Number
    Description: Weight to assign to queue number of visible messages metric (Workflow task)
  
  # Logging parameters
  WireTapLogActivation:
    Type: String
    Default: false
    Description: Activation of wire logs
    AllowedValues:
      - true
      - false
  
  PnCronAnalyzer:
    Type: String
    Default: '-'
    Description: Cron for which you send the metric to CloudWatch
  
  # EFS parameters
  FargateEFSFileSystemID:
    Type: String
    Description: "EFS Filesystem"
  
  MountEfs:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    
  # Heath Check parameters
  HealthCheckInterval:
    Description: Seconds between two health check
    Type: Number
    Default: 60
  
  HealthCheckTimeout:
    Description: health check timeout seconds
    Type: Number
    Default: 5
  
  HealthyThresholdCount:
    Description: |
      The number of consecutive health checks successes required before considering
      an unhealthy target healthy.
    Type: Number
    Default: 5
  
  UnhealthyThresholdCount:
    Description: |
      The number of consecutive health check failures required before considering a target unhealthy.
    Type: Number
    Default: 2

  # Log group parameters
  EcsWorkflowLogGroup:
    Type: String
    Description: 'Ecs log group name (Workflow task)'
  
  WorkflowManagerActionQueueName:
    Type: String
    Description: 'Queue to pull for actions event'
  
  WorkflowManagerActionQueueURL:
    Type: String
    Description: 'URL of the workflow manager actions queue'
  
  WorkflowManagerActionQueueARN:
    Type: String
    Description: 'ARN of the workflow manager actions queue'
    
  WorkflowManagerActionQueueAlarmARN:
    Type: String
    Description: 'pn-workflow-manager actions queue alarm ARN'
    
  WorkflowManagerActionQueueAgeAlarmARN:
    Type: String
    Description: 'pn-workflow-manager actions queue age alarm ARN'
  
  WorkflowManagerAnalogEventQueueName:
    Type: String
    Description: 'Queue to pull for analog events'
  
  WorkflowManagerAnalogEventQueueURL:
    Type: String
    Description: 'URL of the workflow manager analog event queue'
  
  WorkflowManagerAnalogEventQueueARN:
    Type: String
    Description: 'ARN of the workflow manager analog event queue'
    
  WorkflowManagerAnalogEventQueueAlarmARN:
    Type: String
    Description: 'pn-workflow-manager analog event queue alarm ARN'
    
  WorkflowManagerAnalogEventQueueAgeAlarmARN:
    Type: String
    Description: 'pn-workflow-manager analog event queue age alarm ARN'
  
  WorkflowManagerDigitalEventQueueName:
    Type: String
    Description: 'Queue to pull for digital events'
  
  WorkflowManagerDigitalEventQueueURL:
    Type: String
    Description: 'URL of the workflow manager digital event queue'
  
  WorkflowManagerDigitalEventQueueARN:
    Type: String
    Description: 'ARN of the workflow manager digital event queue'
    
  WorkflowManagerDigitalEventQueueAlarmARN:
    Type: String
    Description: 'pn-workflow-manager digital event queue alarm ARN'
    
  WorkflowManagerDigitalEventQueueAgeAlarmARN:
    Type: String
    Description: 'pn-workflow-manager digital event queue age alarm ARN'

  WorkflowManagerIoEventQueueName:
    Type: String
    Description: 'Queue to pull for Io events'
  
  WorkflowManagerIoEventQueueURL:
    Type: String
    Description: 'URL of the workflow manager Io event queue'
  
  WorkflowManagerIoEventQueueARN:
    Type: String
    Description: 'ARN of the workflow manager Io event queue'
    
  WorkflowManagerIoEventQueueAlarmARN:
    Type: String
    Description: 'pn-workflow-manager Io event queue alarm ARN'
    
  WorkflowManagerIoEventQueueAgeAlarmARN:
    Type: String
    Description: 'pn-workflow-manager Io event queue age alarm ARN'


  ActionQueueDetailType:
    Type: CommaDelimitedList
    Description: 'List of action detail type to accept in event bridge rule'

  InformalCommunicationType:
    Type: CommaDelimitedList
    Default: 'INFORMAL'
    Description: 'Informal communication type'

  LogAlarmStrategy:
    Type: String
    Default: 'FATAL'

  AutoscalingDataPointWorkflowN:
    Default: 1
    Type: Number
    Description: activate when N datapoint on M (Workflow task)
  
  AutoscalingDataPointWorkflowM:
    Default: 1
    Type: Number
    Description: activate when N datapoint on M (Workflow task)

  WorkflowManagerCxId:
    Type: String
    Description: 'Client ID for workflow manager, used to route events from event bus to workflow manager queue'

Resources:
  WorkflowManagerMicroservice:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/ecs-service.yaml"
      Parameters:
        MicroServiceUniqueName: !Sub '${ProjectName}-workflow-manager'
        CpuValue: !Ref CpuValue
        MemoryAmount: !Ref MemoryAmount
        HealthCheckTimeout: !Ref HealthCheckTimeout
        HealthCheckInterval: !Ref HealthCheckInterval
        HealthyThresholdCount: !Ref HealthyThresholdCount
        UnhealthyThresholdCount: !Ref UnhealthyThresholdCount
        AutoscalingStrategy: CUSTOM
        AutoscalingThreshold: !Ref AutoscalingThreshold
        AutoscalingCheckPeriod: !Ref AutoscalingCheckPeriod
        MinTasksNumber: !Ref MinTasksNumber
        MaxTasksNumber: !Ref MaxTasksNumber
        AutoscalingDataPointN: !Ref AutoscalingDataPointN
        AutoscalingDataPointM: !Ref AutoscalingDataPointM
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        EfsFilesystem: !Ref FargateEFSFileSystemID
        WireTapLogActivation: !Ref WireTapLogActivation
        MountEfs: !Ref MountEfs
        ContainerImageURI: !Sub '${ContainerImageUri}'
        ContainerEnvEntry1: !Sub 'AWS_REGIONCODE=${AWS::Region}'
        ContainerEnvEntry2: !Sub 'PN_CRON_ANALYZER=${PnCronAnalyzer}'
        ContainerEnvEntry3: !Sub 'WIRE_TAP_LOG=${WireTapLogActivation}'
        ContainerEnvEntry4: !Sub 'PN_WORKFLOWMANAGER_TOPICS_ACTIONQUEUE=${WorkflowManagerActionQueueName}'
        ContainerEnvEntry5: !Sub 'PN_WORKFLOWMANAGER_TOPICS_DIGITALQUEUE=${WorkflowManagerDigitalEventQueueName}'
        ContainerEnvEntry6: !Sub 'PN_WORKFLOWMANAGER_TOPICS_ANALOGQUEUE=${WorkflowManagerAnalogEventQueueName}'
        ContainerEnvEntry7: !Sub 'PN_WORKFLOWMANAGER_TOPICS_IOQUEUE=${WorkflowManagerIoEventQueueName}'
        ContainerEnvEntry8: !Sub 'PN_WORKFLOWMANAGER_CXID=${WorkflowManagerCxId}'
        ContainerEnvEntry9: !Sub 'PN_WORKFLOWMANAGER_DELIVERYBASEURL=http://${ApplicationLoadBalancerDomain}:8080'
        ApplicativeEnvFileChecksum: !Ref ApplicativeEnvFileChecksum
        JavaToolOptions: '-Dreactor.netty.ioWorkerCount=50'
        MappedPaths: '/workflow-manager-not-available'
        ECSClusterName: !Ref ECSClusterName
        Subnets: !Join [ ',', !Ref SubnetsIds ]
        VpcId: !Ref VpcId
        EcsDefaultSecurityGroup: !Ref EcsDefaultSecurityGroup
        LoadBalancerListenerArn: !Ref ApplicationLoadBalancerListenerArn
        LoadbalancerRulePriority: !Ref MicroserviceNumber
        TaskRoleManagedPolicyArn: !Ref WorkflowManagerMicroserviceTaskManagedPolicy
        AlbSecurityGroup: !Ref AlbSecurityGroup
        EcsLogGroup: !Ref EcsWorkflowLogGroup
        LogAlarmStrategyV1: !Ref LogAlarmStrategy

  ## Dashboard
  WorkflowManagerMicroserviceCloudWatchDashboard:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/microservice-cloudwatch-dashboard.yaml"
      Parameters:
        DashboardName: !Sub "${ProjectName}-workflow-manager"
        AlarmArns: !Join
          - ','
          - - !GetAtt WorkflowManagerMicroservice.Outputs.FatalLogsMetricAlarmArn
            - !Ref WorkflowManagerActionQueueAlarmARN
            - !Ref WorkflowManagerActionQueueAgeAlarmARN
            - !Ref WorkflowManagerAnalogEventQueueAlarmARN
            - !Ref WorkflowManagerAnalogEventQueueAgeAlarmARN
            - !Ref WorkflowManagerDigitalEventQueueAlarmARN
            - !Ref WorkflowManagerDigitalEventQueueAgeAlarmARN
            - !Ref WorkflowManagerIoEventQueueAlarmARN
            - !Ref WorkflowManagerIoEventQueueAgeAlarmARN
        QueueArns: !Join
          - ','
          - - !Ref WorkflowManagerActionQueueARN
            - !Ref WorkflowManagerAnalogEventQueueARN
            - !Ref WorkflowManagerDigitalEventQueueARN
            - !Ref WorkflowManagerIoEventQueueARN
        LogGroupsNames: !Join
          - ','
          - - !Sub '/aws/ecs/${ProjectName}-workflow-manager'
  
  # Grant operational rights to PN-Workflow-Manager microservice
  WorkflowManagerMicroserviceTaskManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - sqs:ChangeMessageVisibility
              - sqs:ChangeMessageVisibilityBatch
              - sqs:DeleteMessage
              - sqs:DeleteMessageBatch
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
              - sqs:ReceiveMessage
              - sqs:SendMessage
            Resource:
              - !Ref WorkflowManagerActionQueueARN
              - !Ref WorkflowManagerAnalogEventQueueARN
              - !Ref WorkflowManagerDigitalEventQueueARN
              - !Ref WorkflowManagerIoEventQueueARN

  EventBusEnqueueRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"
        Version: "2012-10-17"
      Policies:
        - PolicyName: !Sub ${ProjectName}-EventBusEnqueueRolePolicy
          PolicyDocument:
            Statement:
              - Sid: putEvents
                Action:
                  - sqs:SendMessage
                Effect: Allow
                Resource:
                  - !Ref WorkflowManagerActionQueueARN
                  - !Ref WorkflowManagerAnalogEventQueueARN
                  - !Ref WorkflowManagerDigitalEventQueueARN
                  - !Ref WorkflowManagerIoEventQueueARN

  PnCoreEventBusToWorkflowManagerActionQueueRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Route Action events to workflow manager action queue
      RoleArn: !GetAtt "EventBusEnqueueRole.Arn"
      EventBusName: !Sub '${ProjectName}-CoreEventBus'
      EventPattern:
        detail-type: ["ActionManagerEventOutcome"]
        detail:
          routingActionType: !Ref ActionQueueDetailType
          communicationType: !Ref InformalCommunicationType
      Targets:
        - Arn: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PnCoreEventBusMatchedEventLogger
          Id: !Sub ${ProjectName}-Logger-ActionToWorkflowManagerQueue
          InputTransformer:
            InputPathsMap:
              "timestamp": "$.time"
            InputTemplate: |
              {
                  "timestamp": <timestamp>,
                  "ruleArn": <aws.events.rule-arn>,
                  "ruleName": <aws.events.rule-name>,
                  "ingestionTime": <aws.events.event.ingestion-time>,
                  "originalEvent": <aws.events.event.json>
              }
        - Id: !Sub '${ProjectName}-CoreEventBus-ActionEventToWorkflowManagerActionQueue'
          Arn: !Ref WorkflowManagerActionQueueARN
          InputPath: $.detail.body
          DeadLetterConfig:  
            Arn: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:pn-CoreEventBus-DLQ

  EventBridgeToScheduledActionsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref WorkflowManagerActionQueueURL
      PolicyDocument:
        Statement:
          - Sid: AllowEventBridgeToSendMessage
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !Ref WorkflowManagerActionQueueARN
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt PnCoreEventBusToWorkflowManagerActionQueueRule.Arn
  
  PnCoreEventBusToWorkflowManagerAnalogEventQueue:
    Type: AWS::Events::Rule
    Properties:
      Description: Route Analog Events to workflow manager analog event queue
      RoleArn: !GetAtt "EventBusEnqueueRole.Arn"
      EventBusName: !Sub '${ProjectName}-CoreEventBus'
      EventPattern:
        detail-type: [ "PaperChannelOutcomeEvent" ]
        detail:
          clientId: [ !Ref WorkflowManagerCxId ]
      Targets:
        - Arn: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PnCoreEventBusMatchedEventLogger
          Id: !Sub ${ProjectName}-Logger-AnalogToWorkflowManagerQueue
          InputTransformer:
            InputPathsMap:
              "timestamp": "$.time"
            InputTemplate: |
              {
                  "timestamp": <timestamp>,
                  "ruleArn": <aws.events.rule-arn>,
                  "ruleName": <aws.events.rule-name>,
                  "ingestionTime": <aws.events.event.ingestion-time>,
                  "originalEvent": <aws.events.event.json>
              }
        - Id: !Sub '${ProjectName}-CoreEventBus-AnalogEventToWorkflowManagerQueue'
          Arn: !Ref WorkflowManagerAnalogEventQueueARN
          InputPath: $.detail
          DeadLetterConfig:
            Arn: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:pn-CoreEventBus-DLQ

  EventBridgeToWorkflowManagerAnalogEventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref WorkflowManagerAnalogEventQueueURL
      PolicyDocument:
        Statement:
          - Sid: AllowEventBridgeToSendMessage
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !Ref WorkflowManagerAnalogEventQueueARN
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt PnCoreEventBusToWorkflowManagerAnalogEventQueue.Arn

  PnCoreEventBusToWorkflowManagerDigitalEventQueue:
    Type: AWS::Events::Rule
    Properties:
      Description: Route Digital Events to workflow manager digital event queue
      RoleArn: !GetAtt "EventBusEnqueueRole.Arn"
      EventBusName: !Sub '${ProjectName}-CoreEventBus'
      EventPattern:
        detail-type: [ "ExternalChannelOutcomeEvent" ]
        detail:
          clientId: [ !Ref WorkflowManagerCxId ]
      Targets:
        - Arn: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PnCoreEventBusMatchedEventLogger
          Id: !Sub ${ProjectName}-Logger-DigitalToWorkflowManagerQueue
          InputTransformer:
            InputPathsMap:
              "timestamp": "$.time"
            InputTemplate: |
              {
                  "timestamp": <timestamp>,
                  "ruleArn": <aws.events.rule-arn>,
                  "ruleName": <aws.events.rule-name>,
                  "ingestionTime": <aws.events.event.ingestion-time>,
                  "originalEvent": <aws.events.event.json>
              }
        - Id: !Sub '${ProjectName}-CoreEventBus-DigitalEventToWorkflowManagerQueue'
          Arn: !Ref WorkflowManagerDigitalEventQueueARN
          InputPath: $.detail
          DeadLetterConfig:
            Arn: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:pn-CoreEventBus-DLQ

  EventBridgeToWorkflowManagerDigitalEventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref WorkflowManagerDigitalEventQueueURL
      PolicyDocument:
        Statement:
          - Sid: AllowEventBridgeToSendMessage
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !Ref WorkflowManagerDigitalEventQueueARN
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt PnCoreEventBusToWorkflowManagerDigitalEventQueue.Arn

  PnCoreEventBusToWorkflowManagerIoEventQueue:
    Type: AWS::Events::Rule
    Properties:
      Description: Route Io Events to workflow manager Io event queue
      RoleArn: !GetAtt "EventBusEnqueueRole.Arn"
      EventBusName: !Sub '${ProjectName}-CoreEventBus'
      EventPattern:
        detail-type: [ "IoConnectorOutcomeEvent" ]
        detail:
          clientId: [ !Ref WorkflowManagerCxId ]
      Targets:
        - Arn: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PnCoreEventBusMatchedEventLogger
          Id: !Sub ${ProjectName}-Logger-IoToWorkflowManagerQueue
          InputTransformer:
            InputPathsMap:
              "timestamp": "$.time"
            InputTemplate: |
              {
                  "timestamp": <timestamp>,
                  "ruleArn": <aws.events.rule-arn>,
                  "ruleName": <aws.events.rule-name>,
                  "ingestionTime": <aws.events.event.ingestion-time>,
                  "originalEvent": <aws.events.event.json>
              }
        - Id: !Sub '${ProjectName}-CoreEventBus-IoEventToWorkflowManagerQueue'
          Arn: !Ref WorkflowManagerIoEventQueueARN
          InputPath: $.detail
          DeadLetterConfig:
            Arn: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:pn-CoreEventBus-DLQ

  EventBridgeToWorkflowManagerIoEventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref WorkflowManagerIoEventQueueURL
      PolicyDocument:
        Statement:
          - Sid: AllowEventBridgeToSendMessage
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !Ref WorkflowManagerIoEventQueueARN
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt PnCoreEventBusToWorkflowManagerIoEventQueue.Arn

  #### Alarm for custom metric Autoscaling
  AlarmCustomAutoscalingWorkflow:
    Type: "AWS::CloudWatch::Alarm"
    Properties:
      AlarmName: !Sub "${ProjectName}-workflow-manager-autoscaling-custom"
      AlarmDescription: "Trigger scaling based on custom metric"
      DatapointsToAlarm: !Ref AutoscalingDataPointWorkflowN
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              Dimensions:
                - Name: QueueName
                  Value: !Ref "WorkflowManagerActionQueueName"
              Namespace: "AWS/SQS"
              MetricName: "ApproximateNumberOfMessagesVisible"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: m2
          MetricStat:
            Metric:
              Dimensions:
                - Name: QueueName
                  Value: !Ref "WorkflowManagerAnalogEventQueueName"
              Namespace: "AWS/SQS"
              MetricName: "ApproximateNumberOfMessagesVisible"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: m3
          MetricStat:
            Metric:
              Dimensions:
                - Name: QueueName
                  Value: !Ref "WorkflowManagerDigitalEventQueueName"
              Namespace: "AWS/SQS"
              MetricName: "ApproximateNumberOfMessagesVisible"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: m4
          MetricStat:
            Metric:
              Dimensions:
                - Name: QueueName
                  Value: !Ref "WorkflowManagerIoEventQueueName"
              Namespace: "AWS/SQS"
              MetricName: "ApproximateNumberOfMessagesVisible"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: m5
          MetricStat:
            Metric:
              Dimensions:
                - Name: TargetGroup
                  Value: !GetAtt WorkflowManagerMicroservice.Outputs.TargetGroupName
                - Name: LoadBalancer
                  Value: !Ref ApplicationLoadBalancerMetricsDimensionName
              Namespace: "AWS/ApplicationELB"
              MetricName: "HealthyHostCount"
            Period: !Ref AutoscalingCheckPeriod
            Stat: Average
          ReturnData: False
        - Id: code
          Expression: !Sub "IF(m5==0, 101, (100*(m1+m2+m3+m4)) / (${ConsumedQueueMessagePerMinute} * m5) )"
          Label: !Sub "${ProjectName}-workflow-manager-queue-custom-metric"
          ReturnData: False
        - Id: e1
          Expression: "code"
          Label: !Sub "${ProjectName}-workflow-manager-autoscale-custom-metric" 
      EvaluationPeriods: !Ref AutoscalingDataPointWorkflowM
      Threshold: 60
      AlarmActions:
        - !GetAtt WorkflowManagerMicroservice.Outputs.ScaleUpPolicy
      OKActions:
        - !GetAtt WorkflowManagerMicroservice.Outputs.ScaleDownPolicy